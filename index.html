<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hector Sport | Quad Cortex Presets</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            background: linear-gradient(rgba(8,8,8,0.75), rgba(8,8,8,0.92)), 
                        url('IMG_1386.jpg') center 30% / cover no-repeat fixed;
            display: flex;
            align-items: center;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        
        h1 {
            font-family: 'Oswald', Impact, sans-serif;
            font-size: 5.2rem;
            font-weight: 700;
            letter-spacing: -3px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 4px 25px rgba(0,0,0,0.9);
        }
        
        .subtitle {
            font-family: 'Oswald', sans-serif;
            font-size: 1.75rem;
            color: #d4af37;
            letter-spacing: 5px;
            margin-bottom: 40px;
        }
        
        .description {
            font-size: 1.3rem;
            max-width: 720px;
            margin: 0 auto 50px;
            color: #ccc;
        }
        
        .btn {
            background-color: #d4af37;
            color: #111;
            padding: 18px 50px;
            font-size: 1.25rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            display: inline-block;
            margin: 20px;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background-color: #e5c56b;
            transform: scale(1.05);
        }
        
        footer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hector Sport</h1>
        <p class="subtitle">QUAD CORTEX PRESETS</p>
        <p class="description">
            Premium presets engineered for tone chasers who demand the best.
        </p>
        
        <a href="presets.html" class="btn">VIEW PRESET PACKS</a>
    </div>

    <footer>
        © Hector Sport • All Rights Reserved
    </footer>
</body>
</html>
