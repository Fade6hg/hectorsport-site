<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hector Sport | Quad Cortex Presets</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: #ddd;
            background: linear-gradient(rgba(10,10,10,0.8), rgba(10,10,10,0.95)), 
                        url('IMG_1386.jpg') center 25% / cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }
        
        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 4.8rem;
            font-weight: 700;
            letter-spacing: -2px;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-family: 'Oswald', sans-serif;
            font-size: 1.6rem;
            color: #d4af37;
            letter-spacing: 4px;
            margin-bottom: 50px;
        }
        
        .description {
            font-size: 1.25rem;
            max-width: 680px;
            margin: 0 auto 60px;
            line-height: 1.5;
        }
        
        .btn {
            background: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            padding: 16px 48px;
            font-size: 1.2rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 0;
            display: inline-block;
            transition: all 0.4s;
        }
        
        .btn:hover {
            background: #d4af37;
            color: #111;
        }
        
        footer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #777;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hector Sport</h1>
        <p class="subtitle">QUAD CORTEX PRESETS</p>
        
        <p class="description">
            Premium presets engineered for tone chasers who demand the best.
        </p>
        
        <a href="presets.html" class="btn">VIEW PRESET PACKS</a>
    </div>

    <footer>
        © Hector Sport • All Rights Reserved
    </footer>
</body>
</html>
