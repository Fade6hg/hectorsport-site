<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hector Sport | Quad Cortex Presets</title>
    <meta name="description" content="Premium Quad Cortex presets.">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-image: url('IMG_1386.jpg');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            padding: 20px;
        }

        h1 {
            font-size: 4.5rem;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -2px;
            color: #f0f0f0;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
        }

        .subtitle {
            font-size: 1.4rem;
            color: #dddddd;
            margin-bottom: 50px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
        }

        .btn {
            display: inline-block;
            padding: 18px 50px;
            border: 2px solid #ffffff;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.2rem;
            border-radius: 6px;
            transition: all 0.4s ease;
        }

        .btn:hover {
            background: white;
            color: #111;
            transform: translateY(-4px);
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>Hector Sport</h1>
            <p class="subtitle">Premium Quad Cortex presets engineered for tone chasers who demand the best.</p>
            <a href="presets.html" class="btn">View Preset Packs</a>
        </div>
    </section>

</body>
</html>
