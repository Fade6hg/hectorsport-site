<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hector Sport | Quad Cortex Presets</title>
    
    <!-- Better fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: #ddd;
            background: linear-gradient(rgba(10,10,10,0.82), rgba(10,10,10,0.95)), 
                        url('IMG_1386.jpg') center 25% / cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.6rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: #ffffff;
            margin-bottom: 12px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        
        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 1.55rem;
            font-weight: 500;
            color: #d4af37;
            letter-spacing: 3px;
            margin-bottom: 50px;
        }
        
        .description {
            font-size: 1.28rem;
            max-width: 680px;
            margin: 0 auto 60px;
            line-height: 1.6;
        }
        
        .btn {
            background: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            padding: 16px 52px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.4s;
        }
        
        .btn:hover {
            background: #d4af37;
            color: #111;
        }

        .artists {
            margin-top: 90px;
            text-align: left;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .artists h2 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            margin-bottom: 25px;
            text-align: center;
            font-size: 1.8rem;
        }
        
        .artist-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 14px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hector Sport</h1>
        <p class="subtitle">QUAD CORTEX PRESETS</p>
        
        <p class="description">
            Premium presets engineered for tone chasers who demand the best.
        </p>
        
        <a href="presets.html" class="btn">VIEW PRESET PACKS</a>

        <div class="artists">
            <h2>ARTISTS I'VE WORKED WITH</h2>
            <div class="artist-list">
                <div>Artist Name 1</div>
                <div>Artist Name 2</div>
                <div>Artist Name 3</div>
                <div>Artist Name 4</div>
                <!-- Add more artists here -->
            </div>
        </div>
    </div>

    <footer style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #777; font-size: 0.95rem;">
        © Hector Sport • All Rights Reserved
    </footer>
</body>
</html>
